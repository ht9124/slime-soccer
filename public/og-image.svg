<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#87CEEB"/>
      <stop offset="1" stop-color="#4682B4"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#00CED1"/>
      <stop offset="0.5" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FF4500"/>
    </linearGradient>
    <radialGradient id="ballGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FF6600" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#000" flood-opacity="0.45"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect y="500" width="1200" height="130" fill="#C2A35A"/>
  <line x1="0" y1="500" x2="1200" y2="500" stroke="#ffffff" stroke-opacity="0.4" stroke-width="3"/>

  <!-- Goal nets -->
  <g stroke="#ffffff" stroke-opacity="0.7" stroke-width="2" fill="none">
    <rect x="40" y="350" width="120" height="150"/>
    <line x1="40" y1="390" x2="160" y2="390"/><line x1="40" y1="430" x2="160" y2="430"/><line x1="40" y1="470" x2="160" y2="470"/>
    <line x1="80" y1="350" x2="80" y2="500"/><line x1="120" y1="350" x2="120" y2="500"/>
    <rect x="1040" y="350" width="120" height="150"/>
    <line x1="1040" y1="390" x2="1160" y2="390"/><line x1="1040" y1="430" x2="1160" y2="430"/><line x1="1040" y1="470" x2="1160" y2="470"/>
    <line x1="1080" y1="350" x2="1080" y2="500"/><line x1="1120" y1="350" x2="1120" y2="500"/>
  </g>

  <!-- Blue slime player -->
  <g filter="url(#shadow)">
    <path d="M 210 500 A 70 70 0 0 1 350 500 Z" fill="#00CED1"/>
    <circle cx="305" cy="465" r="7" fill="#ffffff"/>
    <circle cx="307" cy="465" r="3" fill="#000000"/>
  </g>

  <!-- Red slime player -->
  <g filter="url(#shadow)">
    <path d="M 850 500 A 70 70 0 0 1 990 500 Z" fill="#E05020"/>
    <circle cx="895" cy="465" r="7" fill="#ffffff"/>
    <circle cx="893" cy="465" r="3" fill="#000000"/>
  </g>

  <!-- Ball with glow -->
  <circle cx="600" cy="300" r="70" fill="url(#ballGlow)"/>
  <circle cx="600" cy="300" r="26" fill="#FFD700" filter="url(#shadow)"/>

  <!-- Title -->
  <text x="600" y="170" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="900" font-size="96" fill="url(#title)" filter="url(#shadow)">SLIME SOCCER</text>
  <text x="600" y="230" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="700" font-size="32" fill="#ffffff" opacity="0.95">15 Levels · 14 Bosses · 1P vs AI &amp; 2 Player</text>

  <!-- Free badge -->
  <g filter="url(#shadow)">
    <rect x="470" y="555" width="260" height="52" rx="26" fill="#FFD700"/>
    <text x="600" y="590" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="26" fill="#111111">PLAY FREE — NO DOWNLOAD</text>
  </g>
</svg>
