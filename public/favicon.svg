<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1a1a2e"/>
      <stop offset="1" stop-color="#0d0d1a"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#FFD700"/>
      <stop offset="1" stop-color="#FF6600" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- rounded background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <!-- ground line -->
  <rect x="6" y="46" width="52" height="4" rx="2" fill="#C2A35A"/>
  <!-- ball glow + ball -->
  <circle cx="42" cy="22" r="13" fill="url(#glow)"/>
  <circle cx="42" cy="22" r="6" fill="#FFD700"/>
  <!-- teal slime -->
  <path d="M 12 46 A 14 14 0 0 1 40 46 Z" fill="#00CED1"/>
  <!-- eye -->
  <circle cx="32" cy="38" r="3" fill="#fff"/>
  <circle cx="33" cy="38" r="1.5" fill="#000"/>
</svg>
